<!DOCTYPE html>
<html>
<head>
    <title>Registered Users</title>
    <style>
        body  { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h2    { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th    { background: #007bff; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        a     { display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>Registered Users</h2>
    <table>
        <tr>
            <th>Name</th><th>Username</th><th>Age</th><th>Gender</th><th>Email</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.age }}</td>
            <td>{{ user.gender }}</td>
            <td>{{ user.email }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5" style="text-align:center;">No users registered yet.</td></tr>
        {% endfor %}
    </table>
    <a href="{% url 'register' %}">Register New User</a>
</body>
</html>
