<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        h2   { text-align: center; }
        table { width: 100%; }
        td   { padding: 8px; }
        input, select { width: 100%; padding: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white;
                 border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        a { display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>User Registration</h2>
    <form method="post">
        {% csrf_token %}
        <table>{{ form.as_table }}</table>
        <button type="submit">Register</button>
    </form>
    <a href="{% url 'user_list' %}">View Registered Users</a>
</body>
</html>
