<!-- Create a site that needs to have two buttons; one for adding an item into the list and another for removing the last item from the list.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic List Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2 class="title">Dynamic List Controller</h2>

    <div class="btn-group">
      <button id="addBtn" class="btn btn-add">Add Item</button>
      <button id="removeBtn" class="btn btn-remove">Remove Last Item</button>
    </div>

    <div id="inputArea" class="input-area hidden">
      <label for="itemInput">Type an item to insert into List:</label>
      <input type="text" id="itemInput" placeholder="e.g. write any item" />
      <button id="confirmAdd" class="btn btn-confirm">ADD</button>
    </div>

    <ul id="itemList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
